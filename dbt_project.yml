name: 'lending_analytics'
version: '1.0.0'
config-version: 2

profile: 'lending_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  lending_analytics:
    staging:
      +materialized: view
      +schema: staging
    dim:
      +materialized: table
      +schema: dim
    fct:
      +materialized: incremental
      +schema: fct
    mart:
      +materialized: table
      +schema: mart
